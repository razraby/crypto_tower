<svg width="720" height="720" viewBox="0 0 720 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Wide vintage hanging chandelier</title>
  <desc>A warm minimal SVG illustration of a wide vintage hanging chandelier with seven candles, curled golden arms, glass cups, and softly animated flames.</desc>
  <defs>
    <linearGradient id="gold" x1="90" y1="38" x2="630" y2="575" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7B86D"/>
      <stop offset="0.48" stop-color="#9C742E"/>
      <stop offset="1" stop-color="#65461B"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="170" y1="110" x2="550" y2="545" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7CB85"/>
      <stop offset="1" stop-color="#8A6124"/>
    </linearGradient>
    <linearGradient id="candle" x1="70" y1="190" x2="650" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2CE"/>
      <stop offset="1" stop-color="#D6C19A"/>
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 332) rotate(90) scale(70 300)">
      <stop stop-color="#FFFFFF" stop-opacity="0.72"/>
      <stop offset="0.58" stop-color="#D6DEE0" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#98A7AA" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 300) rotate(90) scale(210 335)">
      <stop stop-color="#F3C266" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#F3C266" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 12) rotate(90) scale(28 18)">
      <stop stop-color="#FFE8A1"/>
      <stop offset="0.56" stop-color="#F5A43A"/>
      <stop offset="1" stop-color="#C65B24"/>
    </radialGradient>
    <style>
      image { image-rendering: auto; }
      .flame-gif {
        transform-box: fill-box;
        transform-origin: 50% 88%;
        animation: flame-sway 0.85s ease-in-out infinite alternate;
      }
      .flame-gif:nth-of-type(2n) { animation-duration: 1.05s; }
      .flame-gif:nth-of-type(3n) { animation-duration: 0.72s; }
      @keyframes flame-sway {
        0% { transform: translateX(-2px) rotate(-3deg) scaleX(0.9) scaleY(1.08); opacity: 0.86; }
        55% { transform: translateX(3px) rotate(4deg) scaleX(1.13) scaleY(0.94); opacity: 1; }
        100% { transform: translateX(-1px) rotate(-1deg) scaleX(0.98) scaleY(1.16); opacity: 0.92; }
      }
    </style>
  </defs>
<ellipse cx="360" cy="304" rx="316" ry="220" fill="url(#glow)"/>

